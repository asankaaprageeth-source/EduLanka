services:
  # ── Backend API (Node.js Web Service) ─────────────────────────────────────
  - type: web
    name: edulanka-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Supabase PostgreSQL (Prisma ORM)
      - key: DATABASE_URL
        sync: false      # set in Render dashboard
      - key: DIRECT_URL
        sync: false      # set in Render dashboard
      # Auth
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      # CORS
      - key: ALLOWED_ORIGINS
        value: https://edulanka-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://edulanka-frontend.onrender.com
      # Email (optional)
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: EduLanka <noreply@edulanka.lk>
      - key: UPLOAD_PATH
        value: ./uploads

  # ── Frontend (React Static Site) ──────────────────────────────────────────
  - type: web
    name: edulanka-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://edulanka-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
